# wes-local-cache-manager -- TEST-ADD overlay (single-node, side-loaded image).
#
# This is the manifest test-add-node.sh applies. It differs from the production
# manifest (../wes-local-cache-manager.yaml) in exactly two ways, both required
# for a safe local test:
#   1. an OPTIONAL nodeSelector (commented out by default) to pin the DaemonSet to
#      one node. See the note at the selector below.
#   2. image is the side-loaded name (docker.io/library/...:test), NOT a registry
#      image -- because test-add-node.sh builds it natively with podman and imports
#      it into k3s. The side-load retags to docker.io/library/..., so the manifest
#      MUST use that name; localhost/... would make kubelet try to PULL and
#      ImagePullBackOff.
# Everything else (caps, probe, mount, tolerations) matches production.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wes-local-cache-manager-env
  labels:
    app.kubernetes.io/name: wes-local-cache-manager
data:
  CACHE_ROOT: "/local-cache"
  SWEEP_INTERVAL_SECONDS: "60"
  PER_SUBDIR_MAX_BYTES: "2147483648"     # 2 GiB
  PER_NODE_MAX_BYTES: "16106127360"      # 15 GiB
  CACHE_UNIT_DEPTH: "2"
  # DRY_RUN: "1"                         # uncomment to log evictions without deleting
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wes-local-cache-manager
  labels:
    app.kubernetes.io/name: wes-local-cache-manager
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wes-local-cache-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wes-local-cache-manager
    spec:
      # OPTIONAL node pin. By DEFAULT it is commented out, so this overlay works on
      # any single-node test cluster with no editing. You do NOT need it: the test
      # image is side-loaded onto one node only, so on a multi-node cluster the pod
      # ImagePullBackOffs anywhere it wasn't loaded regardless. Uncomment + set your
      # hostname (kubectl get nodes) ONLY if you want to be extra-explicit about
      # which node runs it on a multi-node cluster. Production removes this entirely.
      # nodeSelector:
      #   kubernetes.io/hostname: <your-node-hostname>
      priorityClassName: system-node-critical
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
      containers:
        - name: wes-local-cache-manager
          # side-loaded name (see header + test-add-node.sh), NOT a registry image.
          image: docker.io/library/wes-local-cache-manager:test
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              memory: 32Mi
            requests:
              cpu: 100m
              memory: 32Mi
          envFrom:
            - configMapRef:
                name: wes-local-cache-manager-env
          volumeMounts:
            - name: local-cache
              mountPath: /local-cache
          livenessProbe:
            exec:
              command:
                - rm
                - /tmp/healthy
            periodSeconds: 120
            failureThreshold: 3
      volumes:
        - name: local-cache
          hostPath:
            path: /media/plugin-data/local-cache
            type: DirectoryOrCreate
