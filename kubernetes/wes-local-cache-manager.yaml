# wes-local-cache-manager -- Layer-2 quota backstop for the shared /local-cache.
#
# PRODUCTION manifest. Modeled on kubernetes/wes-upload-agent.yaml, with the
# deliberate differences:
#   * mounts the CACHE root (/media/plugin-data/local-cache), NOT uploads;
#   * does NOT upload and needs no beehive ssh creds / upload-agent config;
#   * its only job is to enforce two byte caps by an oldest-first periodic sweep.
# See ../DESIGN-AND-PURPOSE.md and manager/sweeper.py for the rationale.
#
# Runs on EVERY node (no nodeSelector), exactly like wes-upload-agent. Uses a
# registry image. For the local side-loaded test-add, see the `test/` overlay.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wes-local-cache-manager-env
  labels:
    app.kubernetes.io/name: wes-local-cache-manager
data:
  CACHE_ROOT: "/local-cache"
  SWEEP_INTERVAL_SECONDS: "60"
  # per cache unit (each dir CACHE_UNIT_DEPTH levels below root) -- one greedy unit starves only itself
  PER_SUBDIR_MAX_BYTES: "2147483648"     # 2 GiB
  # per node total -- the outer ceiling across all caches (also catches strays)
  PER_NODE_MAX_BYTES: "16106127360"      # 15 GiB
  CACHE_UNIT_DEPTH: "2"                  # levels below root that define a "unit"
  # SAFE ROLLOUT: set DRY_RUN to "1" to log evictions WITHOUT deleting. Recommended
  # for the first deployment to a fleet -- confirm the sweep logs look right, then
  # remove it to enable real eviction.
  # DRY_RUN: "1"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wes-local-cache-manager
  labels:
    app.kubernetes.io/name: wes-local-cache-manager
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wes-local-cache-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wes-local-cache-manager
    spec:
      priorityClassName: system-node-critical
      tolerations:
        # keep reclaiming space even under disk pressure (same as upload-agent)
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
      containers:
        - name: wes-local-cache-manager
          image: waggle/wes-local-cache-manager:0.1.0   # pinned release tag (see VERSION); update on each release
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              memory: 32Mi
            requests:
              cpu: 100m
              memory: 32Mi
          envFrom:
            - configMapRef:
                name: wes-local-cache-manager-env
          volumeMounts:
            - name: local-cache
              mountPath: /local-cache
          livenessProbe:
            # sweeper touches /tmp/healthy each successful sweep; probe removes it.
            # if a stuck loop fails to recreate it, the rm fails -> restart.
            exec:
              command:
                - rm
                - /tmp/healthy
            periodSeconds: 120
            failureThreshold: 3
      volumes:
        - name: local-cache
          hostPath:
            path: /media/plugin-data/local-cache
            type: DirectoryOrCreate
